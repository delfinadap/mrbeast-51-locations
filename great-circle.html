// === Great circle math ===
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function toXYZ(lat, lng) {
  const la = toRad(lat), lo = toRad(lng);
  return [Math.cos(la)*Math.cos(lo), Math.cos(la)*Math.sin(lo), Math.sin(la)];
}
function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function normalize(v) {
  const len = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
  return [v[0]/len, v[1]/len, v[2]/len];
}

function greatCirclePoints(p1, p2, n = 720) {
  const a = toXYZ(p1.lat, p1.lng), b = toXYZ(p2.lat, p2.lng);
  const normal = normalize(cross(a, b));
  const u = normalize(a), v = normalize(cross(normal, u));
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = (2*Math.PI*i)/n;
    const x = Math.cos(t)*u[0]+Math.sin(t)*v[0];
    const y = Math.cos(t)*u[1]+Math.sin(t)*v[1];
    const z = Math.cos(t)*u[2]+Math.sin(t)*v[2];
    pts.push({ lat: toDeg(Math.asin(z)), lng: toDeg(Math.atan2(y, x)) });
  }
  return pts;
}

function gcPathData(p1, p2) {
  const pts = greatCirclePoints(p1, p2, 720);
  const paths = []; let cur = [pts[0]];
  for (let i = 1; i < pts.length; i++) {
    if (Math.abs(pts[i].lng - pts[i-1].lng) > 90) {
      if (cur.length > 1) paths.push(cur);
      cur = [pts[i]];
    } else cur.push(pts[i]);
  }
  if (cur.length > 1) paths.push(cur);
  return paths;
}

// === Build panel ===
function buildPanel() {
  const panel = document.getElementById('panel');
  let html = '<div style="display:flex;align-items:center;margin-bottom:6px"><h2 style="margin:0">Great Circles</h2>';
  html += '<span class="toggle-all" id="toggleAll">show all</span></div>';

  for (let i = 0; i < CIRCLES.length; i++) {
    const c = CIRCLES[i];
    const locs = c.points.map(p => p.name).join(' + ');
    const devStr = c.dev.toFixed(3) + '°';
    html += `<label class="circle-row">
      <input type="checkbox" data-idx="${i}" ${c.on ? 'checked' : ''}>
      <div class="circle-dot" style="background:${c.color}"></div>
      <div class="circle-info">
        <div class="circle-name">${c.name}${c.tier === 'confirmed' ? '<span class="tier-badge tier-confirmed">confirmed</span>' : c.tier === 'probable' ? '<span class="tier-badge tier-probable">probable</span>' : c.tier === 'unconfirmed' ? '<span class="tier-badge tier-unconfirmed">unconfirmed</span>' : ''}</div>
        <div class="circle-locs">${locs}</div>
        <div class="circle-dev">${c.vehicles} — ${devStr}</div>
      </div>
    </label>`;
  }
  html += `<div style="margin-top:10px;border-top:1px solid #333;padding-top:8px">
    <div style="display:flex;gap:4px;margin-bottom:6px">
      <span class="usage-tab active" data-tab="boats" style="font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;background:#333;color:#ccc">⚓ Boats</span>
      <span class="usage-tab" data-tab="vehicles" style="font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;background:#222;color:#666">🚗 Vehicles</span>
    </div>
    <div id="boatUsageSection"></div>
    <div id="vehicleUsageSection" style="display:none"></div>
  </div>`;
  html += '</div></div>';

  panel.innerHTML = html;

  panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.idx);
      const circle = CIRCLES[idx];
      const checked = e.target.checked;

      if (circle.group) {
        // Toggle all items in the same group
        CIRCLES.forEach((c, i) => {
          if (c.group === circle.group) c.on = checked;
        });
        panel.querySelectorAll('input[type=checkbox]').forEach(ocb => {
          const oidx = parseInt(ocb.dataset.idx);
          ocb.checked = CIRCLES[oidx].on;
        });
      } else {
        circle.on = checked;
      }
      refresh();
    });
  });

  document.getElementById('toggleAll').addEventListener('click', () => {
    const allOn = CIRCLES.every(c => c.on);
    CIRCLES.forEach(c => c.on = !allOn);
    panel.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = !allOn);
    document.getElementById('toggleAll').textContent = !allOn ? 'hide all' : 'show all';
    refresh();
  });
}

// === Globe ===
const vtypeIcons = { boat: '⚓', plane: '✈', car: '🚗', horse: '🐴', other: '?' };

function getVisiblePoints() {
  const pts = [];
  for (const c of CIRCLES) {
    if (!c.on) continue;
    for (const p of c.points) pts.push({ ...p, color: c.color, circle: c.name });
  }
  return pts;
}

// Non-boat points get rings for visual distinction
function getVisibleRings() {
  const rings = [];
  for (const c of CIRCLES) {
    if (!c.on) continue;
    for (const p of c.points) {
      if (p.vtype !== 'boat') {
        rings.push({ ...p, color: c.color });
      }
    }
  }
  return rings;
}

function arcBetween(p1, p2, n = 360) {
  const a = toXYZ(p1.lat, p1.lng), b = toXYZ(p2.lat, p2.lng);
  const dot = a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
  const angle = Math.acos(Math.max(-1, Math.min(1, dot)));
  const sinAngle = Math.sin(angle);
  if (sinAngle < 1e-10) return [];
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const A = Math.sin((1-t)*angle) / sinAngle;
    const B = Math.sin(t*angle) / sinAngle;
    const x = A*a[0] + B*b[0], y = A*a[1] + B*b[1], z = A*a[2] + B*b[2];
    pts.push({ lat: toDeg(Math.asin(z)), lng: toDeg(Math.atan2(y, x)) });
  }
  return pts;
}

function getVisibleArcs() {
  const arcs = [];
  for (const c of CIRCLES) {
    if (!c.on) continue;
    const boat1 = c.points[0], boat2 = c.points[c.points.length - 1];
    const pts = arcBetween(boat1, boat2, 360);
    for (let i = 0; i < pts.length - 1; i++) {
      const dLng = Math.abs(pts[i+1].lng - pts[i].lng);
      if (dLng > 90) continue;
      arcs.push({
        startLat: pts[i].lat, startLng: pts[i].lng,
        endLat: pts[i+1].lat, endLng: pts[i+1].lng,
        color: c.color
      });
    }
  }
  return arcs;
}
